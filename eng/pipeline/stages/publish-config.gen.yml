pipelineymlgen:
  output:
    - file: publish-config-prod.yml
      data:
        prod: true
    - file: publish-config-nonprod.yml
      data:
        prod: false
---
# This pipeline template injects the publish config for the
# production (prod) or non-production (nonprod) environment.

# This is based on eng/pipeline/stages/publish-config-prod.yml (and nonprod) but
# "$(public-mirror.server)" is removed from RegistryAuthentication because we
# don't manipulate it, only read it. We don't want to include its values, and
# fake values aren't accepted in this case, so we clone this file to omit it.

parameters:
# By default, images are staged in repos that are prefixed with this pipeline
# build ID. This is makes it easy to look up which pipeline images were built
# from and vice versa.
- name: sourceBuildPipelineRunId
  type: string
  default: $(Build.BuildId)

# This prefix is added to the staging repo when pushing images. If the trailing
# slash is omitted, it will not be added automatically.
- name: stagingRepoPrefix
  type: string
  default: "build-staging/"

# Images will have this prefix added to their repo name when pushed to the
# publishing ACR. If the trailing slash is omitted, it will not be added
# automatically.
- name: publishRepoPrefix
  type: string
  default: "public/"

# This template will have the publishConfig, internalProjectName, and
# publicProjectName parameters passed to it automatically.
- name: stagesTemplate
  type: string

# These parameters will be passed to the template referred to by the
# stagesTemplate parameter.
# Note: publishConfig, internalProjectName, and publicProjectName are passed
# automatically by this template. Don't define them in this parameter - they
# will get overwritten.
- name: stagesTemplateParameters
  type: object
  default: {}

# Enable container image signing
- name: enableSigning
  type: boolean
  default: false


stages:
- template: ${{ parameters.stagesTemplate }}
  parameters:
    ${{ insert }}: ${{ parameters.stagesTemplateParameters }}

    internalProjectName: "internal"
    publicProjectName: "public"

    # publishConfig schema is defined in src/ImageBuilder/Configuration/PublishConfiguration.cs.
    # This will get converted to JSON and placed in appsettings.json to be loaded by ImageBuilder at runtime.
    publishConfig:
      InternalMirrorRegistry:
        server:
          ${ inlineif .prod }: $(acr-staging.server)
          ${ inlineelse }: $(acr-staging-test.server)
        repoPrefix: $(internalMirrorRepoPrefix)

      PublicMirrorRegistry:
        server: $(public-mirror.server)
        repoPrefix: $(publicMirrorRepoPrefix)

      BuildRegistry:
        server:
          ${ inlineif .prod }: $(acr-staging.server)
          ${ inlineelse }: $(acr-staging-test.server)
        repoPrefix: "${{ parameters.stagingRepoPrefix }}${{ parameters.sourceBuildPipelineRunId }}/"

      PublishRegistry:
        server:
          ${ inlineif .prod }: $(acr.server)
          ${ inlineelse }: $(acr-test.server)
        repoPrefix: "${{ parameters.publishRepoPrefix }}"

      RegistryAuthentication:
        - server:
            ${ inlineif .prod }: $(acr-staging.server)
            ${ inlineelse }: $(acr-staging-test.server)
          resourceGroup:
            ${ inlineif .prod }: $(acr-staging.resourceGroup)
            ${ inlineelse }: $(testResourceGroup)
          subscription:
            ${ inlineif .prod }: $(acr-staging.subscription)
            ${ inlineelse }: $(testSubscription)
          serviceConnection:
            name:
              ${ inlineif .prod }: $(build.serviceConnectionName)
              ${ inlineelse }: $(build-test.serviceConnectionName)
            id:
              ${ inlineif .prod }: $(build.serviceConnection.id)
              ${ inlineelse }: $(build-test.serviceConnection.id)
            clientId:
              ${ inlineif .prod }: $(build.serviceConnection.clientId)
              ${ inlineelse }: $(build-test.serviceConnection.clientId)
            tenantId:
              ${ inlineif .prod }: $(build.serviceConnection.tenantId)
              ${ inlineelse }: $(testTenant)
        - server:
            ${ inlineif .prod }: $(acr.server)
            ${ inlineelse }: $(acr-test.server)
          resourceGroup:
            ${ inlineif .prod }: $(acr.resourceGroup)
            ${ inlineelse }: $(testResourceGroup)
          subscription:
            ${ inlineif .prod }: $(acr.subscription)
            ${ inlineelse }: $(testSubscription)
          serviceConnection:
            name:
              ${ inlineif .prod }: $(publish.serviceConnectionName)
              ${ inlineelse }: $(publish-test.serviceConnectionName)
            id:
              ${ inlineif .prod }: $(publish.serviceConnection.id)
              ${ inlineelse }: $(publish-test.serviceConnection.id)
            clientId:
              ${ inlineif .prod }: $(publish.serviceConnection.clientId)
              ${ inlineelse }: $(publish-test.serviceConnection.clientId)
            tenantId:
              ${ inlineif .prod }: $(publish.serviceConnection.tenantId)
              ${ inlineelse }: $(testTenant)

      cleanServiceConnection:
        name:
          ${ inlineif .prod }: $(clean.serviceConnectionName)
          ${ inlineelse }: $(clean-test.serviceConnectionName)
        id:
          ${ inlineif .prod }: $(clean.serviceConnection.id)
          ${ inlineelse }: $(clean-test.serviceConnection.id)
        clientId:
          ${ inlineif .prod }: $(clean.serviceConnection.clientId)
          ${ inlineelse }: $(clean-test.serviceConnection.clientId)
        tenantId:
          ${ inlineif .prod }: $(clean.serviceConnection.tenantId)
          ${ inlineelse }: $(testTenant)

      testServiceConnection:
        name:
          ${ inlineif .prod }: $(test.serviceConnectionName)
          ${ inlineelse }: $(test-nonprod.serviceConnectionName)
        id:
          ${ inlineif .prod }: $(test.serviceConnection.id)
          ${ inlineelse }: $(test-nonprod.serviceConnection.id)
        clientId:
          ${ inlineif .prod }: $(test.serviceConnection.clientId)
          ${ inlineelse }: $(test-nonprod.serviceConnection.clientId)
        tenantId:
          ${ inlineif .prod }: $(test.serviceConnection.tenantId)
          ${ inlineelse }: $(testTenant)

      Signing:
        Enabled: ${{ parameters.enableSigning }}
        ImageSigningKeyCode:
          ${ inlineif .prod }: $(microBuildSigningKeyCode.containers)
          ${ inlineelse }: $(microBuildSigningKeyCode.testing)
        ReferrerSigningKeyCode:
          ${ inlineif .prod }: $(microBuildSigningKeyCode.attestations)
          ${ inlineelse }: $(microBuildSigningKeyCode.testing)
        # Use signType 'real' even for non-prod to actually sign with the test certificate.
        # The 'test' signType skips signing entirely on linux; the test keycode provides a non-production certificate.
        SignType: real
        TrustStoreName:
          ${ inlineif .prod }: supplychain
          ${ inlineelse }: test
