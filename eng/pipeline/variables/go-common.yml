variables:
- template: /eng/pipeline/variables/common.yml@self

- template: /eng/docker-tools/templates/variables/dnceng-build-pools.yml@self
- template: /eng/docker-tools/templates/variables/dnceng-signing.yml@self
- template: /eng/docker-tools/templates/variables/dnceng-project-names.yml@self

# Custom config, not defined in .NET Docker Tools templates, but used in the
# templates and defined by each repository using the tools:

- name: manifest
  value: manifest.json

# No pre-build tests. Set to "" to skip the PreBuildValidation job entirely.
# (It must be set at compile time, so the default in
# eng/docker-tools/templates/variables/common-paths.yml doesn't work.)
- name: preBuildTestScriptPath
  value: ''

# We don't use a different ACR for staging vs. non-staging images.
- name: acr-staging.resourceGroup
  value: $(acr.resourceGroup)
- name: acr-staging.server
  value: $(acr.server)
- name: acr-staging.subscription
  value: $(acr.subscription)

# We don't host a public mirror for public CI. Internally this is specified by
# go-docker-common-2.
#
# Note: an empty string is necessary so the variable is defined and .NET Docker
# logic works.
- ${{ if ne(variables['System.TeamProject'], 'internal') }}:
  - name: public-mirror.resourceGroup
    value: ''
  - name: public-mirror.server
    value: ''
  - name: public-mirror.subscription
    value: ''
  - name: public-mirror.serviceConnectionName
    value: ''
  - name: public-mirror.serviceConnection.id
    value: ''
  - name: public-mirror.serviceConnection.tenantId
    value: ''
  - name: public-mirror.serviceConnection.clientId
    value: ''

# $(dockerHubRegistryCreds) is needed by the copy-base-images step in
# eng/docker-tools/templates/stages/build-and-test.yml#L73-L78, even during a dry-run.
# This is a placeholder that gets replaced when referencing the secrets.yml
# variable template.
- name: dockerHubRegistryCreds
  value: --registry-creds 'docker.io=placeholder;placeholder'
