# This pipeline builds and publishes Go infra images on a rolling basis.

# official: https://dev.azure.com/dnceng/internal/_build?definitionId=1170
# unofficial: https://dev.azure.com/dnceng/internal/_build?definitionId=1515

pipelineymlgen:
  output:
    - file: ${ trimSuffix ".gen.yml" .filename }-pipeline-unofficial.yml
      data:
        official: false
    - file: ${ trimSuffix ".gen.yml" .filename }-pipeline.yml
      data:
        official: true
---

trigger:
  ${ inlineif .official }:
    batch: true
    branches:
      include:
        - main
pr: none
schedules:
  - ${ inlineif .official }:
    - cron: '0 10 * * Tue,Thu'
      displayName: Periodic build to refresh dependencies
      branches:
        include:
          - main
      always: true

parameters:
  - name: sourceBuildPipelineRunId
    displayName: >
      The build ID of this pipeline to publish images from.
      Use the default value when building new images.
    type: string
    default: '$(Build.BuildId)'

  - name: publishRepoPrefix
    displayName: >
      Publish repo prefix to use when publishing images.
      Switch to "dev/" for an unofficial branch.
    type: string
    default:
      ${ inlineif .official }: 'unlisted/'
      ${ inlineelse }: 'dev/'

variables:
  - template: /eng/pipeline/variables/go-common.yml@self
  - template: /eng/pipeline/variables/secrets.yml@self

resources:
  repositories:
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

    - repository: VersionsRepo
      type: git
      name: microsoft-go-images-versions
      ref: ${{ variables['gitHubVersionsRepoInfo.branch'] }}

extends:
  ${ inlineif .official }:
    template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  ${ inlineelse }:
    template: v1/1ES.Unofficial.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    sdl:
      sourceAnalysisPool:
        name: NetCore1ESPool-Internal
        image: 1es-windows-2022
        os: windows
      sourceRepositoriesToScan:
        include:
          - repository: VersionsRepo
      tsa:
        enabled: true
        configFile: $(SDLConfigFileDir)/tsa/tsaoptions.json
    stages:
      - template: /eng/pipeline/stages/publish-config-prod.yml@self
        parameters:
          sourceBuildPipelineRunId: ${{ parameters.sourceBuildPipelineRunId }}
          publishRepoPrefix: ${{ parameters.publishRepoPrefix }}
          stagesTemplate: /eng/docker-tools/templates/stages/dotnet/build-test-publish-repo.yml@self
          stagesTemplateParameters:
            sourceBuildPipelineRunId: ${{ parameters.sourceBuildPipelineRunId }}
            buildMatrixCustomBuildLegGroupArgs: --custom-build-leg-group build
            versionsRepoRef: VersionsRepo
            noCache: true
            customGenerateMatrixInitSteps:
              - template: /eng/pipeline/steps/set-public-source-branch-var.yml@self
            customBuildInitSteps:
              - template: /eng/pipeline/steps/set-imagebuilder-build-args-var.yml@self
              - template: /eng/pipeline/steps/set-public-source-branch-var.yml@self
            customPublishInitSteps:
              - template: /eng/pipeline/steps/set-public-source-branch-var.yml@self
              - pwsh: echo "##vso[task.setvariable variable=SDLConfigFileDir]$(SDLConfigFileMultiRepoDir)"
                displayName: 'Set SDLConfigFileDir for multi-checkout'
