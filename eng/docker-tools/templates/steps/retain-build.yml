# Pins the current build forever via the releasego retain-build subcommand
# (PATCHes AzDO build/builds/{id} with keepForever=true). Gated on
# variables.retainBuild == 'true' so non-release runs are unaffected.
#
# The release pipeline that triggered this build cannot pin from the outside
# because go-images / go-infra-images self-trigger to production on their own
# schedule, so retention is decided here.
#
# This template assumes the Go toolchain and releasego have already been
# installed earlier in the job. Consumers must add `GoTool@0` and
# `go install github.com/microsoft/go-infra/cmd/releasego` at the job level
# (gated on retainBuild) before invoking this template.
steps:
- pwsh: |
    & "$(go env GOPATH)/bin/releasego" retain-build -azdopat $env:SYSTEM_ACCESSTOKEN
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  displayName: Enable permanent build retention
  condition: and(succeeded(), eq(variables.retainBuild, 'true'))
